<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#0d0d2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="24"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#brand)"/>
  <text x="116" y="135" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif"
        font-size="44" font-weight="900" fill="white" text-anchor="middle">智</text>

  <!-- Brand name -->
  <text x="80" y="260" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif"
        font-size="88" font-weight="900" fill="url(#brand)" letter-spacing="-2">智傑科技</text>
  <text x="80" y="340" font-family="'Segoe UI','Arial',sans-serif"
        font-size="52" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="2">· HighTech</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif"
        font-size="30" fill="rgba(255,255,255,0.45)" letter-spacing="1">
    網頁設計・ERP 系統開發・B2C 電商解決方案
  </text>

  <!-- Divider line -->
  <rect x="80" y="468" width="200" height="3" rx="2" fill="url(#brand)"/>

  <!-- URL -->
  <text x="80" y="520" font-family="'Segoe UI','Arial',sans-serif"
        font-size="24" fill="rgba(255,255,255,0.25)">
    hightech.com.tw
  </text>
</svg>
